name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Linux binaries + packages ───
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            bun_target: bun-linux-x64
            deb_arch: amd64
            rpm_arch: x86_64
            appimage_arch: x86_64
          - arch: arm64
            bun_target: bun-linux-arm64
            deb_arch: arm64
            rpm_arch: aarch64
            appimage_arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      # Stub react-devtools-core
      - run: |
          mkdir -p node_modules/react-devtools-core
          echo '{"name":"react-devtools-core","version":"0.0.0","main":"index.js"}' > node_modules/react-devtools-core/package.json
          echo 'module.exports={};' > node_modules/react-devtools-core/index.js

      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Build binary
      - name: Build binary
        run: |
          mkdir -p dist/bin
          bun build src/index.tsx --compile --target=${{ matrix.bun_target }} \
            --outfile=dist/bin/claudex-linux-${{ matrix.arch }}

      # tar.gz
      - name: Package tar.gz
        run: |
          mkdir -p dist/packages staging/claudex-${{ steps.ver.outputs.VERSION }}
          cp dist/bin/claudex-linux-${{ matrix.arch }} staging/claudex-${{ steps.ver.outputs.VERSION }}/claudex
          chmod +x staging/claudex-${{ steps.ver.outputs.VERSION }}/claudex
          printf '#!/bin/bash\nset -e\nsudo cp claudex /usr/local/bin/claudex\nsudo chmod +x /usr/local/bin/claudex\necho "claudex installed!"' \
            > staging/claudex-${{ steps.ver.outputs.VERSION }}/install.sh
          chmod +x staging/claudex-${{ steps.ver.outputs.VERSION }}/install.sh
          tar -czf dist/packages/claudex-${{ steps.ver.outputs.VERSION }}-linux-${{ matrix.arch }}.tar.gz -C staging .

      # .deb
      - name: Package .deb
        run: |
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp dist/bin/claudex-linux-${{ matrix.arch }} deb/usr/local/bin/claudex
          chmod +x deb/usr/local/bin/claudex
          cat > deb/DEBIAN/control << EOF
          Package: claudex
          Version: ${{ steps.ver.outputs.VERSION }}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: claudex
          Description: Claude Code UI + OpenAI models CLI
          EOF
          # Fix control file formatting (remove leading spaces)
          sed -i 's/^          //' deb/DEBIAN/control
          dpkg-deb --build deb dist/packages/claudex-${{ steps.ver.outputs.VERSION }}-linux-${{ matrix.deb_arch }}.deb

      # .rpm
      - name: Package .rpm
        run: |
          sudo apt-get install -y rpm 2>/dev/null || true
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT/usr/local/bin}
          cp dist/bin/claudex-linux-${{ matrix.arch }} rpmbuild/BUILDROOT/usr/local/bin/claudex
          chmod +x rpmbuild/BUILDROOT/usr/local/bin/claudex
          cat > rpmbuild/SPECS/claudex.spec << 'EOF'
          Name: claudex
          Version: ${{ steps.ver.outputs.VERSION }}
          Release: 1
          Summary: Claude Code UI + OpenAI models CLI
          License: MIT
          AutoReqProv: no
          %description
          Interactive coding assistant with Claude Code UI and OpenAI models.
          %install
          mkdir -p %{buildroot}/usr/local/bin
          cp %{_topdir}/BUILDROOT/usr/local/bin/claudex %{buildroot}/usr/local/bin/
          %files
          /usr/local/bin/claudex
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/claudex.spec
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/claudex.spec || true
          cp rpmbuild/RPMS/*/*.rpm dist/packages/ 2>/dev/null || true

      # .AppImage
      - name: Package .AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/bin/claudex-linux-${{ matrix.arch }} AppDir/usr/bin/claudex
          chmod +x AppDir/usr/bin/claudex
          cat > AppDir/claudex.desktop << 'EOF'
          [Desktop Entry]
          Name=claudex
          Exec=claudex
          Icon=claudex
          Type=Application
          Terminal=true
          Categories=Development;
          EOF
          sed -i 's/^          //' AppDir/claudex.desktop
          mkdir -p AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp AppDir/claudex.desktop AppDir/usr/share/applications/
          # Minimal icon
          convert -size 256x256 xc:cyan AppDir/usr/share/icons/hicolor/256x256/apps/claudex.png 2>/dev/null || \
            printf '\x89PNG\r\n\x1a\n' > AppDir/usr/share/icons/hicolor/256x256/apps/claudex.png
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/claudex" "$@"' > AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage" -O appimagetool && \
            chmod +x appimagetool && \
            ARCH=${{ matrix.appimage_arch }} ./appimagetool AppDir \
              "dist/packages/claudex-${{ steps.ver.outputs.VERSION }}-linux-${{ matrix.appimage_arch }}.AppImage" || \
            echo "AppImage skipped"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-${{ matrix.arch }}
          path: dist/packages/*

  # ─── macOS binaries + packages ───
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            bun_target: bun-darwin-x64
          - arch: arm64
            bun_target: bun-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - run: |
          mkdir -p node_modules/react-devtools-core
          echo '{"name":"react-devtools-core","version":"0.0.0","main":"index.js"}' > node_modules/react-devtools-core/package.json
          echo 'module.exports={};' > node_modules/react-devtools-core/index.js

      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          mkdir -p dist/bin
          bun build src/index.tsx --compile --target=${{ matrix.bun_target }} \
            --outfile=dist/bin/claudex-darwin-${{ matrix.arch }}

      # .pkg
      - name: Package .pkg
        run: |
          mkdir -p dist/packages staging/usr/local/bin
          cp dist/bin/claudex-darwin-${{ matrix.arch }} staging/usr/local/bin/claudex
          chmod +x staging/usr/local/bin/claudex
          pkgbuild --root staging --identifier com.claudex.cli \
            --version ${{ steps.ver.outputs.VERSION }} --install-location / \
            dist/packages/claudex-${{ steps.ver.outputs.VERSION }}-macos-${{ matrix.arch }}.pkg

      # .dmg
      - name: Package .dmg
        run: |
          mkdir -p dmg_content
          cp dist/bin/claudex-darwin-${{ matrix.arch }} dmg_content/claudex
          chmod +x dmg_content/claudex
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nsudo cp "$DIR/claudex" /usr/local/bin/claudex\nsudo chmod +x /usr/local/bin/claudex\necho "Done! Run: claudex"\nread -p "Press Enter..."' > dmg_content/install.command
          chmod +x dmg_content/install.command
          hdiutil create -volname "claudex-${{ steps.ver.outputs.VERSION }}" \
            -srcfolder dmg_content -ov -format UDZO \
            dist/packages/claudex-${{ steps.ver.outputs.VERSION }}-macos-${{ matrix.arch }}.dmg

      # tar.gz
      - name: Package tar.gz
        run: |
          mkdir -p tarball/claudex-${{ steps.ver.outputs.VERSION }}
          cp dist/bin/claudex-darwin-${{ matrix.arch }} tarball/claudex-${{ steps.ver.outputs.VERSION }}/claudex
          chmod +x tarball/claudex-${{ steps.ver.outputs.VERSION }}/claudex
          tar -czf dist/packages/claudex-${{ steps.ver.outputs.VERSION }}-macos-${{ matrix.arch }}.tar.gz -C tarball .

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-${{ matrix.arch }}
          path: dist/packages/*

  # ─── Windows binaries + packages ───
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
        include:
          - arch: x64
            bun_target: bun-windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Stub devtools
        shell: bash
        run: |
          mkdir -p node_modules/react-devtools-core
          echo '{"name":"react-devtools-core","version":"0.0.0","main":"index.js"}' > node_modules/react-devtools-core/package.json
          echo 'module.exports={};' > node_modules/react-devtools-core/index.js

      - name: Set version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist/bin
          bun build src/index.tsx --compile --target=${{ matrix.bun_target }} \
            --outfile=dist/bin/claudex-windows-${{ matrix.arch }}.exe

      # .zip
      - name: Package .zip
        shell: bash
        run: |
          mkdir -p dist/packages
          cd dist/bin
          7z a "../packages/claudex-${{ steps.ver.outputs.VERSION }}-windows-${{ matrix.arch }}.zip" \
            "claudex-windows-${{ matrix.arch }}.exe"

      # NSIS installer
      - name: Package NSIS installer
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $arch = "${{ matrix.arch }}"
          $binPath = "$(Get-Location)\dist\bin\claudex-windows-${arch}.exe"
          $outPath = "$(Get-Location)\dist\packages\claudex-${version}-windows-${arch}-setup.exe"

          @"
          !include "MUI2.nsh"
          Name "claudex ${version}"
          OutFile "${outPath}"
          InstallDir "`$LOCALAPPDATA\claudex"
          RequestExecutionLevel user
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath "`$INSTDIR\bin"
            File "/oname=claudex.exe" "${binPath}"
            WriteRegStr HKCU "Environment" "Path" "`$INSTDIR\bin;$%Path%"
            SendMessage 0xFFFF 0x001A 0 "STR:Environment" /TIMEOUT=500
          SectionEnd
          Section "Uninstall"
            Delete "`$INSTDIR\bin\claudex.exe"
            RMDir "`$INSTDIR\bin"
            RMDir "`$INSTDIR"
          SectionEnd
          "@ | Set-Content -Path "installer.nsi"

          choco install nsis -y 2>$null
          makensis installer.nsi 2>$null
          if (-not $?) { Write-Host "NSIS installer build skipped" }

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-${{ matrix.arch }}
          path: dist/packages/*

  # ─── Create Release ───
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: packages
          merge-multiple: true

      - name: List packages
        run: find packages -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "claudex v${{ steps.ver.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          body: |
            ## claudex v${{ steps.ver.outputs.VERSION }}

            Claude Code UI + OpenAI models. Login with your ChatGPT account — no API key needed.

            ### Install

            | Platform | File | Install |
            |----------|------|---------|
            | **macOS (Apple Silicon)** | `.pkg` | Double-click to install |
            | **macOS (Intel)** | `.pkg` | Double-click to install |
            | **Linux x64** | `.deb` | `sudo dpkg -i claudex-*.deb` |
            | **Linux x64** | `.rpm` | `sudo rpm -i claudex-*.rpm` |
            | **Linux arm64** | `.deb` | `sudo dpkg -i claudex-*.deb` |
            | **Linux** | `.tar.gz` | Extract & run `./install.sh` |
            | **Linux** | `.AppImage` | `chmod +x *.AppImage && ./*.AppImage` |
            | **Windows x64** | `-setup.exe` | Run installer |
            | **Windows x64** | `.zip` | Extract & add to PATH |

            ### First run
            ```
            claudex
            ```
            The setup wizard will guide you through theme, permission mode, model selection, and ChatGPT login.

            ### Quick start
            ```bash
            claudex login         # Login with ChatGPT account
            claudex               # Start interactive session
            claudex -p "fix bug"  # One-shot prompt
            claudex --model o3    # Use specific model
            ```
          files: packages/*
